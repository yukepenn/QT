strategy: pa_broad_channel_zone

# Raw grid: 3 * 3 * 2 * 2 * 3 * 1 * 3 * 3 = 972. First axis zone_max_frac starts at 0.5 for preflight first-combo.
grid:
  signal.zone_max_frac: [0.6666666666666666, 0.5, 0.3333333333333333]
  signal.side: [long_only]
  signal.broad_bull_score_min: [0.16, 0.24, 0.32]
  signal.entry_start_minute: [45, 60]
  signal.entry_end_minute: [240, 330]
  risk.stop_mode: [range_low, signal_low, atr_buffer]
  risk.target_mode: [fixed_r]
  risk.target_r: [1.0, 1.25, 1.5]
  backtest.max_hold_minutes: [45, 60, 90]

fixed:
  features.orb_open_minutes: 15
  features.pa_regime_window: 30
  signal.require_vwap_context: false
  signal.block_climax: true
  signal.climax_score_max: 0.78
  signal.max_pullback_depth_atr: 1.5
  signal.min_pullback_depth_atr: 0.05
  risk.atr_buffer_mult: 0.35
  risk.min_risk_per_share: 0.03
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.commission_per_trade: 0.0
  backtest.slippage_per_share: 0.01
  backtest.recompute_target_from_entry: true
