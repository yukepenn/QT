strategy: afternoon_continuation

grid:
  signal.side: [long_only]
  signal.entry_start_minute: [240, 270]
  signal.entry_end_minute: [330]
  features.morning_end_minute: [90, 120]
  signal.min_morning_return_atr: [0.5, 1.0]
  signal.min_vwap_persistence: [0.7, 0.8]
  signal.require_midday_hold_vwap: [false]
  signal.breakout_volume_mult: [1.0]
  risk.stop_mode: [midday_low]
  risk.target_mode: [fixed_r]
  risk.target_r: [1.25, 1.5, 1.75, 2.0]
  backtest.max_hold_minutes: [45, 60, 90, 120]

fixed:
  features.midday_window: 60
  risk.vwap_buffer_atr: 0.10
  risk.min_risk_per_share: 0.03
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.commission_per_trade: 0.0
  backtest.slippage_per_share: 0.01
  backtest.recompute_target_from_entry: true
