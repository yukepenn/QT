strategy: pa_failed_range_breakout_trap

grid:
  signal.side: [long_only]
  signal.entry_start_minute: [30, 60]
  signal.entry_end_minute: [180, 270]
  signal.fail_window_bars: [4, 6]
  signal.require_tr_regime: [false, true]
  risk.stop_mode: [failed_extreme, range_low_buffer, signal_low]
  risk.target_mode: [fixed_r, range_mid, range_high]
  risk.target_r: [1.0, 1.25]
  backtest.max_hold_minutes: [30, 45]

fixed:
  features.orb_open_minutes: 15
  features.pa_range_window: 60
  signal.tr_regime_max: 0.42
  risk.atr_buffer_mult: 0.35
  risk.min_risk_per_share: 0.03
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.commission_per_trade: 0.0
  backtest.slippage_per_share: 0.01
  backtest.recompute_target_from_entry: true
