strategy: midday_compression_breakout

grid:
  signal.side: [long_only]
  signal.entry_start_minute: [120, 150, 180]
  signal.entry_end_minute: [240, 300]
  features.compression_window: [20, 30, 60]
  signal.max_range_atr: [1.0, 1.5, 2.0]
  signal.require_volume_dryup: [false, true]
  signal.breakout_volume_mult: [1.0, 1.2, 1.5]
  signal.require_vwap_side: [false, true]
  risk.stop_mode: [range_mid, range_opposite, breakout_candle]
  risk.target_mode: [fixed_r]
  risk.target_r: [1.0, 1.25, 1.5, 2.0]
  backtest.max_hold_minutes: [30, 60, 90, 120]

fixed:
  risk.min_risk_per_share: 0.03
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.commission_per_trade: 0.0
  backtest.slippage_per_share: 0.01
  backtest.recompute_target_from_entry: true
