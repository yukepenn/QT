strategy: donchian_channel_breakout

# Raw grid 1728 (<=2000): widened channel width + earlier entry; volume expansion fixed false.
grid:
  signal.entry_start_minute: [30, 60, 90]
  signal.entry_end_minute: [270, 330]
  signal.min_channel_width_atr: [0.25, 0.8]
  signal.max_channel_width_atr: [2.5, 3.5, 4.0]
  signal.require_vwap_side: [false, true]
  signal.require_volume_expansion: [false]
  risk.stop_mode: [breakout_candle_low, channel_mid]
  risk.target_r: [1.0, 1.25, 1.5]
  risk.atr_buffer_mult: [0.4, 0.55]
  backtest.max_hold_minutes: [45, 60]

fixed:
  signal.side: long_only
  signal.atr_column: atr_like_20
  features.vol_windows: [5, 15, 20, 30]
  features.channels.bb_windows: []
  features.channels.bb_stds: []
  features.channels.bb_bandwidth_lookbacks: []
  features.channels.donchian_windows: [20, 30, 60]
  risk.target_mode: fixed_r
  risk.min_risk_per_share: 0.03
  risk.max_trades_per_day: 1
  signal.volume_expansion_mult: 1.15
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.commission_per_trade: 0.0
  backtest.slippage_per_share: 0.01
  backtest.recompute_target_from_entry: true
