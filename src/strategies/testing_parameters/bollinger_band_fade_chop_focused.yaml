strategy: bollinger_band_fade_chop

grid:
  features.bb_window: [20, 30]
  features.bb_std: [1.5, 2.0]
  features.regime_window: [30, 60]
  signal.entry_start_minute: [60, 90]
  signal.entry_end_minute: [270, 330]
  signal.max_range_efficiency: [0.22, 0.3]
  signal.min_vwap_cross_count: [2.0, 4.0]
  signal.trigger_mode: [lower_band_reclaim, wick_rejection]
  risk.stop_mode: [band_extreme, signal_candle_low]
  risk.target_mode: [fixed_r, bb_mid]
  risk.target_r: [1.0, 1.25]
  backtest.max_hold_minutes: [30, 45, 60]

fixed:
  signal.side: long_only
  signal.atr_column: atr_like_20
  signal.require_range_regime: true
  features.vol_windows: [5, 15, 20, 30]
  features.channels.bb_windows: [20, 30]
  features.channels.bb_stds: [1.5, 2.0]
  features.channels.bb_bandwidth_lookbacks: [60, 120]
  features.channels.donchian_windows: []
  features.regime.windows: [30, 60]
  risk.atr_buffer_mult: 0.25
  risk.min_risk_per_share: 0.03
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.commission_per_trade: 0.0
  backtest.slippage_per_share: 0.01
  backtest.recompute_target_from_entry: true
