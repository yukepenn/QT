strategy: orb_retest_continuation

grid:
  features.orb_open_minutes: [5, 10]
  signal.side: [long_only]
  signal.entry_start_minute: [5, 10]
  signal.entry_end_minute: [60, 90]
  signal.retest_tolerance_atr: [0.25, 0.5]
  signal.max_retest_bars: [5]
  signal.require_vwap_side: [true]
  signal.require_vwap_slope: [true]
  risk.stop_mode: [retest_low]
  risk.target_mode: [fixed_r]
  risk.target_r: [1.25, 1.5, 1.75, 2.0]
  backtest.max_hold_minutes: [30, 45, 60, 90]

fixed:
  signal.require_pullback_volume_dryup: false
  risk.min_risk_per_share: 0.03
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.commission_per_trade: 0.0
  backtest.slippage_per_share: 0.01
  backtest.recompute_target_from_entry: true
