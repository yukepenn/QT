strategy: gap_acceptance_failure

# Refined diagnostic grid (QQQ only for now).
# Purpose: test entry timing + VWAP context + gap size (ATR) sensitivity.
# Defaults must preserve prior behavior when new keys are unset.

grid:
  signal.side: [long_only]
  signal.mode: [gap_failure]

  # Do NOT hard-delete early entries; make it a parameter.
  signal.entry_start_minute: [0, 5, 15]
  signal.entry_end_minute: [60]

  signal.min_gap_norm: [0.3]
  signal.confirm_mode: [reclaim_vwap]

  # Alias supported: require_vwap_context (preferred in refined grids).
  signal.require_vwap_context: [false, true]

  # New optional filters (None disables).
  signal.min_gap_size_atr: [null, 0.25, 0.50]
  signal.max_gap_size_atr: [null, 1.50, 2.00]

  risk.stop_mode: [failed_extreme]
  risk.target_mode: [fixed_r]
  risk.target_r: [1.5, 1.75]
  backtest.max_hold_minutes: [30, 60]

fixed:
  features.opening_hold_minutes: 10
  signal.require_open_hold: true
  risk.open_buffer_atr: 0.10
  risk.min_risk_per_share: 0.03
  risk.max_trades_per_day: 1
  backtest.eod_exit_minute: 389
  backtest.quantity: 1.0
  backtest.commission_per_trade: 0.0
  backtest.slippage_per_share: 0.01
  backtest.recompute_target_from_entry: true

