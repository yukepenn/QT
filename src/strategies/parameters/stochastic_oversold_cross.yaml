strategy: stochastic_oversold_cross

features:
  orb_open_minutes: 15
  vwap_bands: [1.0, 2.0]
  vol_windows: [5, 15, 20, 30]
  price_action_windows: [3, 5, 10, 20, 30, 60]
  volume_windows: [20, 30]
  indicators:
    ema_windows: []
    sma_windows: []
    rsi_windows: []
    macd_tuples: []
    stochastic_tuples: [[14, 3], [20, 3]]
    cci_windows: []
    adx_windows: []
    supertrend_tuples: []
  channels: {}
  regime: {}
  stoch_window: 14
  stoch_smooth: 3
  swing_lookback: 10

signal:
  side: long_only
  atr_column: atr_like_20
  entry_start_minute: 60
  entry_end_minute: 270
  oversold_level: 20
  confirm_mode: k_cross_d
  require_vwap_filter: false

risk:
  stop_mode: signal_candle_low
  target_mode: fixed_r
  target_r: 1.25
  atr_buffer_mult: 0.35
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  eod_exit_minute: 389
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  recompute_target_from_entry: true
  max_hold_minutes: 30
