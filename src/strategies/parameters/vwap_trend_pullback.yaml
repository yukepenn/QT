strategy: vwap_trend_pullback

features:
  orb_open_minutes: 15
  vwap_bands: [1.0, 2.0]
  vol_windows: [5, 15, 30]

signal:
  side: long_only
  entry_start_minute: 60
  entry_end_minute: 270
  trend_window: 60
  min_vwap_persistence: 0.7
  pullback_tolerance_atr: 0.5
  confirm_mode: close_reclaim
  require_volume_dryup: false
  max_pullback_volume_ratio: 0.8

risk:
  stop_mode: pullback_low
  vwap_buffer_atr: 0.10
  target_mode: fixed_r
  target_r: 1.5
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  eod_exit_minute: 389
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  recompute_target_from_entry: true
  max_hold_minutes: 60
