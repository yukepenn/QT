strategy: supertrend_atr_flip

features:
  orb_open_minutes: 15
  vwap_bands: [1.0, 2.0]
  vol_windows: [5, 10, 14, 15, 20, 30]
  price_action_windows: [3, 5, 10, 20, 30, 60]
  volume_windows: [20, 30]
  indicators:
    ema_windows: [20]
    sma_windows: []
    rsi_windows: []
    macd_tuples: []
    stochastic_tuples: []
    cci_windows: []
    adx_windows: []
    supertrend_tuples: [[10, 2.0], [14, 2.0], [14, 3.0], [20, 2.0], [20, 3.0]]
  channels: {}
  regime: {}
  atr_window: 14
  supertrend_mult: 2.0
  ema_window: 20

signal:
  side: long_only
  atr_column: atr_like_20
  entry_start_minute: 90
  entry_end_minute: 270
  trigger_mode: supertrend_flip_up
  require_ema_filter: false
  require_vwap_side: false

risk:
  stop_mode: supertrend_line
  target_mode: fixed_r
  target_r: 1.25
  atr_buffer_mult: 0.35
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  eod_exit_minute: 389
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  recompute_target_from_entry: true
  max_hold_minutes: 60
