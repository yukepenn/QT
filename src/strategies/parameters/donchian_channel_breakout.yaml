  vwap_bands: [1.0, 2.0]
  vol_windows: [5, 15, 20, 30]
  price_action_windows: [3, 5, 10, 20, 30, 60]
  volume_windows: [20, 30]
  indicators: {}
  channels:
    bb_windows: []
    bb_stds: []
    bb_bandwidth_lookbacks: []
    donchian_windows: [20, 30, 60]
  regime: {}
  donchian_window: 20

signal:
