strategy: gap_acceptance_failure

features:
  orb_open_minutes: 15
  vwap_bands: [1.0, 2.0]
  vol_windows: [5, 15, 30]
  opening_hold_minutes: 10

signal:
  side: long_only
  mode: gap_acceptance
  entry_start_minute: 10
  entry_end_minute: 90
  min_gap_norm: 0.3
  require_vwap_side: false
  confirm_mode: break_pullback
  require_open_hold: true

risk:
  stop_mode: pullback_extreme
  open_buffer_atr: 0.10
  target_mode: fixed_r
  target_r: 1.5
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  eod_exit_minute: 389
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  recompute_target_from_entry: true
  max_hold_minutes: 60
