strategy: macd_momentum_turn

features:
  orb_open_minutes: 15
  vwap_bands: [1.0, 2.0]
  vol_windows: [5, 15, 20, 30]
  price_action_windows: [3, 5, 10, 20, 30, 60]
  volume_windows: [20, 30]
  indicators:
    ema_windows: [20]
    sma_windows: []
    rsi_windows: []
    macd_tuples: [[8, 21, 9], [8, 26, 9], [12, 21, 9], [12, 26, 9]]
    stochastic_tuples: []
    cci_windows: []
    adx_windows: []
    supertrend_tuples: []
  channels: {}
  regime: {}
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  ema_window: 20

signal:
  side: long_only
  atr_column: atr_like_20
  entry_start_minute: 60
  entry_end_minute: 270
  trigger_mode: hist_cross_up
  require_price_above_ema: true
  require_vwap_side: false
  min_hist_slope: 0.0

risk:
  stop_mode: signal_candle_low
  target_mode: fixed_r
  target_r: 1.25
  ema_buffer_atr: 0.1
  atr_buffer_mult: 0.35
  min_risk_per_share: 0.03
  max_trades_per_day: 1

backtest:
  eod_exit_minute: 389
  quantity: 1.0
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  recompute_target_from_entry: true
  max_hold_minutes: 60
