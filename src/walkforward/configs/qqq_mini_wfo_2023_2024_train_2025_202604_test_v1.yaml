experiment:
  name: qqq_mini_wfo_2023_2024_train_2025_202604_test_v1
  purpose: causal_mini_wfo_single_split
  live_ready: false
  note: >
    This is a single causal mini-WFO. It trains only on 2023-2024,
    selects candidates and a Layer 2 system using train only, freezes
    the selected system, then evaluates once on 2025-2026. This is not
    full WFO and not live-ready.

asset: equity
symbol: QQQ

train:
  start: 2023-01-01
  end: 2024-12-31

test:
  start: 2025-01-01
  end: 2026-04-30

paths:
  output_root: src/walkforward/results/layer3_mini_wfo_qqq_2023_2024_train_2025_202604_test_v1
  train_layer1_root: src/walkforward/results/layer3_mini_wfo_qqq_2023_2024_train_2025_202604_test_v1/train_layer1
  train_layer2_root: src/walkforward/results/layer3_mini_wfo_qqq_2023_2024_train_2025_202604_test_v1/train_layer2
  frozen_system_dir: src/walkforward/results/layer3_mini_wfo_qqq_2023_2024_train_2025_202604_test_v1/frozen_system
  test_root: src/walkforward/results/layer3_mini_wfo_qqq_2023_2024_train_2025_202604_test_v1/test

layer1:
  strategies:
    - failed_orb
    - gap_acceptance_failure
  allow_optional_diagnostics:
    - prior_day_level_trap
  primary_strategies:
    - failed_orb
    - gap_acceptance_failure
  include_orb_retest: false
  include_orb_continuation: false
  include_vwap: false
  tag: mini_wfo_train_2023_2024
  top_per_strategy: 5

candidate_selection:
  strict:
    min_trades: 40
    min_profit_factor: 1.02
    min_total_r: 0.0
    max_drawdown_r: -50.0
    max_avg_bars_held: 120
    max_eod_count: 0
    max_end_of_data_count: 0
  relaxed:
    enabled: true
    min_trades: 25
    min_profit_factor: 1.00
    min_total_r: -5.0
    max_drawdown_r: -70.0
  max_candidates_per_strategy: 5

layer2:
  candidate_sets:
    failed_only:
      include_warnings: false
      strategies:
        - failed_orb
    gap_only:
      include_warnings: false
      strategies:
        - gap_acceptance_failure
    failed_gap:
      include_warnings: false
      strategies:
        - failed_orb
        - gap_acceptance_failure
    failed_gap_with_prior_day_diagnostic:
      include_warnings: false
      strategies:
        - failed_orb
        - gap_acceptance_failure
        - prior_day_level_trap

  primary_candidate_sets:
    - failed_only
    - gap_only
    - failed_gap

  diagnostic_candidate_sets:
    - failed_gap_with_prior_day_diagnostic

  grid:
    candidate_set:
      - failed_only
      - gap_only
      - failed_gap
      - failed_gap_with_prior_day_diagnostic
    top_per_strategy:
      - 1
      - 2
      - 3
    system.max_trades_per_day:
      - 1
      - 2
    system.daily_max_loss_r:
      - -1.5
      - -2.0
      - -3.0
    system.cooldown_after_loss_minutes:
      - 0
      - 15
    conflict.priority_policy:
      - metadata_priority
      - score_adjusted_priority

  selection:
    prefer_primary_candidate_sets: true
    penalize_relaxed_candidates: true
    require_min_trades: 80
    require_positive_total_r: true
    require_pf_r_above_1: true
    require_cost_0_02_positive: true
    max_drawdown_r_floor: -50.0
    behavior_dedupe_top: 50
    cost_stress_top: 10

execution:
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  stress_slippage_per_share:
    - 0.02
    - 0.03
  eod_exit_minute: 389
  no_new_after_minute: 360
  recompute_target_from_entry: true
  min_risk_per_share: 0.03
  max_open_positions: 1

cache:
  use_signal_cache: true
  signal_cache_root: .cache/qt/mini_wfo_candidate_signals

outputs:
  save_curated_only: true
  save_compact_trades: false
  save_full_signal_logs: false
  save_rejected_signals: false
  save_monthly_breakdown: true
  save_cost_stress: true
