conflict:
  priority_policy: metadata_priority
  same_bar_policy: priority
  tie_breakers:
    - candidate_score
    - candidate_rank
    - candidate_index
  opposite_direction_policy: ""

candidate_sets:
  volatility_breakout_tuned:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - bollinger_squeeze_breakout

  oscillator_reversal_tuned:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - rsi_failure_swing

  strict_batch1_tuned:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - bollinger_squeeze_breakout
      - rsi_failure_swing
