name: layer2_qqq_v2_completion_2023_2024

candidate_root: src/research/results/layer1_v2_completion_qqq_2023_2024/selected_candidates

execution:
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  eod_exit_minute: 389
  no_new_after_minute: 360
  recompute_target_from_entry: true
  min_risk_per_share: 0.03

system:
  max_open_positions: 1
  max_trades_per_day: 2
  daily_max_loss_r: -2.0
  cooldown_after_loss_minutes: 15
  cooldown_scope: session

conflict:
  priority_policy: metadata_priority
  same_bar_policy: priority
  tie_breakers:
    - candidate_score
    - candidate_rank
    - candidate_index
  opposite_direction_policy: ""

candidate_sets:
  macd_momentum_family:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - macd_momentum_turn

  oscillator_reversal_family:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - stochastic_oversold_cross
      - cci_extreme_snapback

  atr_trend_family:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - supertrend_atr_flip

  level_reclaim_family:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - multi_day_level_trap
      - prior_close_reclaim

  strict_completion_core:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - macd_momentum_turn
      - stochastic_oversold_cross
      - cci_extreme_snapback
      - supertrend_atr_flip
      - multi_day_level_trap
      - prior_close_reclaim

  all_strict_completion:
    include_warnings: false
    max_per_strategy: 5

  all_with_relaxed_completion:
    include_warnings: true
    max_per_strategy: 5

  adx_diagnostic:
    include_warnings: true
    max_per_strategy: 5
    strategies:
      - adx_dmi_trend_continuation
