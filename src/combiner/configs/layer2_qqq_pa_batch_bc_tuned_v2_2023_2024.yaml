name: layer2_qqq_pa_batch_bc_tuned_v2_2023_2024

candidate_root: src/research/results/layer1_pa_batch_bc_tuned_qqq_2023_2024_v2/selected_candidates

execution:
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  eod_exit_minute: 389
  no_new_after_minute: 360
  recompute_target_from_entry: true
  min_risk_per_share: 0.03

system:
  max_open_positions: 1
  max_trades_per_day: 1
  daily_max_loss_r: -1.5
  cooldown_after_loss_minutes: 0
