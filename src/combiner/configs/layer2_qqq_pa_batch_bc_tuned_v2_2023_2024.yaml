  pa_climax:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - pa_climax_reversal

  pa_batch_bc_core:
    include_warnings: false
    max_per_strategy: 5
    strategies:
      - pa_buy_sell_close_trend
      - pa_climax_reversal

  pa_close_trend_top1_diagnostic:
    include_warnings: false
    max_per_strategy: 1
    strategies:
      - pa_buy_sell_close_trend

  pa_climax_top1_diagnostic:
