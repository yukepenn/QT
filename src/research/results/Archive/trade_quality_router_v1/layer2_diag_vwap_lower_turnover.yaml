# Research-only combiner YAML: matches tuned lower-turnover VWAP rank-1 grid (mtp=1, daily -1.5).
# Copy of layer2_qqq_global_2023_2024_v2_cost_turnover.yaml with tightened system limits only.
name: layer2_diag_vwap_lower_turnover
candidate_root: src/research/results/layer1_global_qqq_2023_2024_v2/selected_candidates_l2_core/selected_candidates
execution:
  commission_per_trade: 0.0
  slippage_per_share: 0.01
  eod_exit_minute: 389
  no_new_after_minute: 360
  recompute_target_from_entry: true
  min_risk_per_share: 0.03
system:
  max_open_positions: 1
  max_trades_per_day: 1
  daily_max_loss_r: -1.5
  cooldown_after_loss_minutes: 15
  cooldown_scope: session
conflict:
  priority_policy: metadata_priority
  same_bar_policy: priority
  tie_breakers:
  - candidate_score
  - candidate_rank
  - candidate_index
  opposite_direction_policy: ''
candidate_sets:
  vwap_core:
    include_warnings: false
    max_per_strategy: 4
    strategies:
    - vwap_reclaim_reject
    - vwap_trend_pullback
  indicator_completion_core:
    include_warnings: false
    max_per_strategy: 4
    strategies:
    - cci_extreme_snapback
    - macd_momentum_turn
    - rsi_failure_swing
    - stochastic_oversold_cross
    - supertrend_atr_flip
